name: BoundAllay
version: ${project.version}
main: dev.nafis.boundallay.BoundAllayPlugin
api-version: '1.21'
author: Nafis
description: Cross-play allay companion system with multi-allay support, combat types, and PvP defense.
softdepend: [floodgate]
commands:
  allay:
    description: Manage your bound allays
    usage: /allay [bind|summon|store|release|rename|type|list|summonall|storeall|admin|help] [name]
    permission: boundallay.use
    aliases: [ally, pet]
permissions:
  boundallay.use:
    description: Allows opening the vault and basic allay interaction
    default: true
  boundallay.bind:
    description: Allows binding wild allays
    default: true
  boundallay.summon:
    description: Allows summoning stored allays
    default: true
  boundallay.release:
    description: Allows releasing (permanently unbinding) an allay
    default: true
  boundallay.rename:
    description: Allows renaming bound allays
    default: true
  boundallay.type:
    description: Allows changing an allay's type (FIGHTER/HEALER/GUARDIAN)
    default: true
  boundallay.admin:
    description: Admin commands (reload, stats, rescan)
    default: op
